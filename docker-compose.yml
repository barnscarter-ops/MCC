services:
  mav-console-dashboard:
    build: .
    container_name: mav-console-dashboard
    restart: unless-stopped
    environment:
      PROMETHEUS_URL: http://192.168.1.12:9090
      LLAMA_SERVER_URL: http://192.168.1.10:8080
      MAV_REPO_BRIDGE_URL: http://192.168.1.10:8790
      MAV_CONSOLE_DATA_DIR: /app/data
      MAV_CONSOLE_WORKSPACE: 'C:\Workspace\Active\homelab-noc-dashboard\homelab-noc-dashboard\homelab-noc-dashboard'
      MAV_MEMORY_PATH: 'C:\Users\carte\.claude\projects\memory'
      PORT: 3010
    ports:
      - "3010:3010"
    volumes:
      - mav_console_data:/app/data

  prometheus:
    build:
      context: .
      dockerfile: prometheus.Dockerfile
    container_name: prometheus
    restart: unless-stopped
    network_mode: host
    volumes:
      - prometheus_data:/prometheus


  bgw-exporter:
    build: ./bgw-exporter
    container_name: bgw-exporter
    restart: unless-stopped
    network_mode: host
    ports:
      - "9085:9085"

volumes:
  prometheus_data:
  mav_console_data:
